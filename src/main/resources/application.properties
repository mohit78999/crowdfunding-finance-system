# ============================================================
#  Crowdfunding Finance Management System - Application Config
# ============================================================

spring.application.name=CrowdFunding Finance Management System

# --- Database Connection ---
# MySQL running locally; createDatabaseIfNotExist saves us having to create the DB manually
spring.datasource.url=jdbc:mysql://localhost:3306/CrowdfundingDB?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Shiva@12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# "update" means Hibernate will create/alter tables to match entities without dropping data
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Server ---
server.port=8080

# --- Thymeleaf ---
# Disable caching during development so template changes appear immediately
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# --- Logging ---
# See SQL parameters in the logs (useful for debugging)
logging.level.org.hibernate.type.descriptor.sql=trace
logging.level.com.crowdfunding=debug
