<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${donor.dname} + ' - Donor Details'">Donor Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid mt-4">
    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="row mb-4">
        <div class="col">
            <h1><i class="bi bi-person-circle"></i> Donor Details</h1>
            <p class="text-muted" th:text="${donor.dname}"></p>
        </div>
        <div class="col text-end">
            <a th:href="@{/donors}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Back to Donors
            </a>
            <a th:href="@{/donors/edit/{id}(id=${donor.donorId})}" class="btn btn-warning">
                <i class="bi bi-pencil"></i> Edit
            </a>
        </div>
    </div>

    <!-- Donor profile -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card stat-card donor-card">
                <div class="card-body">
                    <h6 class="card-subtitle mb-2 text-muted">Total Donated</h6>
                    <div class="stat-value text-success">
                        &#8377;<span th:text="${#numbers.formatDecimal(donor.totalDonated != null ? donor.totalDonated : 0, 1, 'COMMA', 2, 'POINT')}"></span>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card">
                <div class="card-body">
                    <h6 class="card-subtitle mb-2 text-muted">Email</h6>
                    <div class="mt-2" th:text="${donor.demail}"></div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card">
                <div class="card-body">
                    <h6 class="card-subtitle mb-2 text-muted">Phone</h6>
                    <div class="mt-2" th:text="${donor.dphone != null ? donor.dphone : 'N/A'}">N/A</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Donation history -->
    <div class="card donor-card">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="bi bi-cash-coin"></i> Donation History</h5>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>TXN ID</th>
                            <th>Fundraiser</th>
                            <th>Gross Amount</th>
                            <th>Platform Fee</th>
                            <th>Net Amount</th>
                            <th>Mode</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(transactions)}">
                            <td colspan="7" class="text-center text-muted">No donations yet.</td>
                        </tr>
                        <tr th:each="tx : ${transactions}">
                            <td><a th:href="@{/transactions/{id}(id=${tx.transactionId})}" th:text="${tx.transactionId}"></a></td>
                            <td th:text="${tx.fundraiser != null ? tx.fundraiser.title : '—'}">—</td>
                            <td>&#8377;<span th:text="${#numbers.formatDecimal(tx.amount, 1, 'COMMA', 2, 'POINT')}"></span></td>
                            <td class="text-warning">&#8377;<span th:text="${#numbers.formatDecimal(tx.platformFee, 1, 'COMMA', 2, 'POINT')}"></span></td>
                            <td class="text-success">&#8377;<span th:text="${#numbers.formatDecimal(tx.netAmount, 1, 'COMMA', 2, 'POINT')}"></span></td>
                            <td><span class="badge bg-info" th:text="${tx.paymentMode}"></span></td>
                            <td th:text="${#temporals.format(tx.transactionDate, 'yyyy-MM-dd HH:mm')}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer class="mt-5 py-3 bg-light text-center">
    <div class="container">
        <p class="text-muted mb-0">Crowdfunding Database Management System &copy; 2026</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
