<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donors - Crowdfunding Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid mt-4">
    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="row mb-4">
        <div class="col">
            <h1><i class="bi bi-people"></i> Donors</h1>
        </div>
        <div class="col text-end">
            <a th:href="@{/donors/add}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Add Donor
            </a>
        </div>
    </div>

    <div class="card donor-card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(donors)}">
                            <td colspan="5" class="text-center text-muted">No donors registered yet.</td>
                        </tr>
                        <tr th:each="donor : ${donors}">
                            <td th:text="${donor.donorId}"></td>
                            <td>
                                <a th:href="@{/donors/{id}(id=${donor.donorId})}" th:text="${donor.dname}"></a>
                            </td>
                            <td th:text="${donor.demail}"></td>
                            <td th:text="${donor.dphone != null ? donor.dphone : 'N/A'}">N/A</td>
                            <td>
                                <a th:href="@{/donors/edit/{id}(id=${donor.donorId})}" class="btn btn-sm btn-warning btn-action">
                                    <i class="bi bi-pencil"></i> Edit
                                </a>
                                <a th:href="@{/donors/delete/{id}(id=${donor.donorId})}"
                                   class="btn btn-sm btn-danger btn-action"
                                   onclick="return confirm('Are you sure? This will delete all transactions and visits for this donor!')">
                                    <i class="bi bi-trash"></i> Delete
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer class="mt-5 py-3 bg-light text-center">
    <div class="container">
        <p class="text-muted mb-0">Crowdfunding Database Management System &copy; 2026</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
