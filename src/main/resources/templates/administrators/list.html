<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrators - Crowdfunding Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid mt-4">
    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="row mb-4">
        <div class="col">
            <h1><i class="bi bi-shield-lock"></i> Administrators</h1>
        </div>
        <div class="col text-end">
            <a th:href="@{/administrators/add}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Add Administrator
            </a>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Total Earnings</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(administrators)}">
                            <td colspan="6" class="text-center text-muted">No administrators found.</td>
                        </tr>
                        <tr th:each="admin : ${administrators}">
                            <td th:text="${admin.adminId}"></td>
                            <td th:text="${admin.name}"></td>
                            <td th:text="${admin.email}"></td>
                            <td th:text="${admin.phone != null ? admin.phone : '—'}"></td>
                            <td class="text-success">
                                <strong>&#8377;<span th:text="${#numbers.formatDecimal(admin.totalEarnings != null ? admin.totalEarnings : 0, 1, 'COMMA', 2, 'POINT')}"></span></strong>
                            </td>
                            <td>
                                <a th:href="@{/administrators/{id}(id=${admin.adminId})}" class="btn btn-sm btn-info btn-action">
                                    <i class="bi bi-currency-dollar"></i> Earnings
                                </a>
                                <a th:href="@{/administrators/edit/{id}(id=${admin.adminId})}" class="btn btn-sm btn-warning btn-action">
                                    <i class="bi bi-pencil"></i> Edit
                                </a>
                                <a th:href="@{/administrators/delete/{id}(id=${admin.adminId})}"
                                   class="btn btn-sm btn-danger btn-action"
                                   onclick="return confirm('Are you sure you want to delete this administrator?')">
                                    <i class="bi bi-trash"></i> Delete
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer class="mt-5 py-3 bg-light text-center">
    <div class="container">
        <p class="text-muted mb-0">Crowdfunding Database Management System &copy; 2026</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
