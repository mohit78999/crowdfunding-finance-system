<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Crowdfunding Management System'">Crowdfunding Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- ===== NAVBAR FRAGMENT (matches Flask base.html exactly) ===== -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-heart-fill"></i> Crowdfunding DB
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"><i class="bi bi-house"></i> Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/fundraisers}"><i class="bi bi-megaphone"></i> Fundraisers</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/donors}"><i class="bi bi-people"></i> Donors</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/transactions}"><i class="bi bi-cash-coin"></i> Transactions</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/payroll}"><i class="bi bi-bank"></i> Payroll</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/visits}"><i class="bi bi-eye"></i> Visits</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/administrators}"><i class="bi bi-shield-lock"></i> Admins</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/analytics}"><i class="bi bi-graph-up-arrow"></i> Analytics</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/reports}"><i class="bi bi-bar-chart"></i> Reports</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ===== FLASH MESSAGES FRAGMENT ===== -->
<div th:fragment="alerts">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
