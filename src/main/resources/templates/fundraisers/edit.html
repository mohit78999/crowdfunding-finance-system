<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Fundraiser - Crowdfunding Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid mt-4">
    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="row">
        <div class="col-md-10 mx-auto">
            <div class="card fundraiser-card">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0"><i class="bi bi-pencil"></i> Edit Fundraiser</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/fundraisers/edit/{id}(id=${fundraiser.fundraiserNo})}" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="title" class="form-label">Title</label>
                                <input type="text" class="form-control" id="title" name="title"
                                       th:value="${fundraiser.title}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="fundraiserOwnerName" class="form-label">Owner Name</label>
                                <input type="text" class="form-control" id="fundraiserOwnerName" name="fundraiserOwnerName"
                                       th:value="${fundraiser.fundraiserOwnerName}" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="4"
                                      th:text="${fundraiser.description}" required></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="goalAmount" class="form-label">Goal Amount (&#8377;)</label>
                                <input type="number" step="0.01" class="form-control" id="goalAmount" name="goalAmount"
                                       th:value="${fundraiser.goalAmount}" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="deadline" class="form-label">Deadline</label>
                                <input type="date" class="form-control" id="deadline" name="deadline"
                                       th:value="${fundraiser.deadline}" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="status" class="form-label">Status</label>
                                <select class="form-control" id="status" name="status" required>
                                    <option th:each="s : ${statusOptions}"
                                            th:value="${s}" th:text="${s}"
                                            th:selected="${s == fundraiser.status}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a th:href="@{/fundraisers}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-warning">Update Fundraiser</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="mt-5 py-3 bg-light text-center">
    <div class="container">
        <p class="text-muted mb-0">Crowdfunding Database Management System &copy; 2026</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
